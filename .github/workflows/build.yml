name: Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  compile:
    name: Compile sketch (ESP32-S2 Mini)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile ESP32S2_SNTP_Clock sketch
        uses: arduino/compile-sketches@v1
        with:
          # LOLIN S2 Mini FQBN using the Espressif ESP32 Arduino core
          fqbn: esp32:esp32:lolin_s2_mini
          sketch-paths: ESP32S2_SNTP_Clock
          # Install the Espressif ESP32 Arduino core from the Boards Manager
          platforms: |
            - name: esp32:esp32
              source-url: https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
